name: Publish cbxy-reader

on:
  release:
    types:
      - published

jobs:
  publish:
    if: startsWith(github.event.release.tag_name, 'cbxy-reader-')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write

    defaults:
      run:
        working-directory: cbxy-reader

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build
        run: uv build

      - name: Publish to PyPI
        run: uv publish
